name: build

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: pnpm hoisted 模式
        run: echo "node-linker=hoisted" > .npmrc

      - name: 安装依赖
        uses: pnpm/action-setup@v6
        with:
          run_install: true

      - name: 初始化数据库
        run: pnpm db:init

      - name: 开始构建
        run: pnpm build

      - name: 复制产物
        run: cp -r .next/standalone dist && cp -r .next/static dist/.next && cp -r public dist

      - name: 打包产物
        run: tar -cvf dist.tar.gz dist

      - name: 上传产物
        uses: actions/upload-artifact@v7
        with:
          # 要上传的文件或文件夹路径 (必填)
          path: dist.tar.gz
          # 保留天数 (可选，范围1-90天，默认值取决于仓库类型)
          retention-days: 7
